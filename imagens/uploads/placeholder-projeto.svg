<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Imagem provisória</title>
  <desc id="description">Marcador visual neutro para um projeto ainda em edição.</desc>
  <rect width="1600" height="900" fill="#f0ece4"/>
  <rect x="40" y="40" width="1520" height="820" rx="16" fill="none" stroke="#342f2a" stroke-width="4" stroke-dasharray="16 16"/>
  <g fill="#342f2a" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="800" y="430" font-size="54" font-weight="700">IMAGEM PROVISÓRIA</text>
    <text x="800" y="500" font-size="28">Substitua este arquivo antes de publicar</text>
  </g>
</svg>
